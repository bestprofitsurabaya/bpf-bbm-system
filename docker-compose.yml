version: '3.8'
services:
  db:
    image: mariadb:10.11
    container_name: bbm_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: password_db
      MYSQL_DATABASE: bpf_asset_system
      MYSQL_USER: bpf_user
      MYSQL_PASSWORD: bpf_pass
    ports:
      - "3307:3306"
    volumes:
      - bbm_db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  web:
    build: .
    container_name: bbm_web
    ports:
      - "5001:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./static:/app/static
    environment:
      - FLASK_ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  bbm_db_data:
